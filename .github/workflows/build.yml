name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Pre-emptively run the @v4 javascript actions on Node 24 instead of the
# deprecated Node 20. This is GitHub's recommended interim fix until v5 of
# checkout/setup-node/upload-artifact ships:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Lint + typecheck + package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Build (tsc)
        run: yarn build

      - name: Package (companion-module-build)
        run: yarn package

      - name: Upload module package
        uses: actions/upload-artifact@v4
        with:
          name: companion-module-tidal-pkg
          path: tidal-*.tgz
          if-no-files-found: error
          retention-days: 30
